      details: |
        Attends Clemson University as a part of the National Scholars Program. Pursuing 
        a degree in Computer Engineering with a research focuses in High Performance
        Computing and Scientific Computing.

experiences:
    - role: Researcher
      time: 2018 
      company: Pioneer Academics
      details: |
       Worked under the mentorship of Professor Gary Washington of the United States
       Military Academy in Computational Quantum Chemistry. Used computational methods to develop
       new information regarding the conductance of lithium nanowires with varying 
       electrodes. Led to the publication of a paper available upon request.

    - role: Mathematics Tutor
      time: 2015-2019
      company: Self-Employed
      details: |
        Tutored high school students in various field of mathematics ranging from Algebra I
        to AP Calculus AB. Led many students to success with various methods of pedagogy and
        enjoyed getting to help my peers. Saw and helped approximately 10 students over 
        the 4 years of high school.


