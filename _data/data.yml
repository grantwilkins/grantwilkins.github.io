career-profile:
    title: Career Profile
    summary: |
      Currently I am pursuing a Bachelor of Science in Computer Engineering with a 
      minor in Computer Science. My research interests
      are in Computational Quantum Chemistry, Machine Learning, High Performance Computing,
      and Parallel Computing. My hobbies include playing guitar, hiking, exercising, and
      reading. I love to work in groups and have developed my leadership skills through 
      Boy Scouts of America, having attained the rank of Eagle Scout. I look to use my computing
      skills to impart an environmentally sustainable outlook on the world. Seeking internship
      experiences.

